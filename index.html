<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-MAX 人間道場：自己フィールド認定テスト</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --qmax-blue: #1e3a5f; --qmax-orange: #f39c12; --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #333; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.8; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, var(--qmax-blue), #2c5282); color: white; padding: 2rem 1rem; text-align: center; }
        .container { max-width: 850px; margin: -1.5rem auto 3rem auto; padding: 0 1rem; }
        .card { background: var(--card-bg); padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 2rem; display: none; }
        .active { display: block !important; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h2 { color: var(--qmax-blue); border-bottom: 2px solid var(--qmax-orange); padding-bottom: 0.5rem; margin-top: 0; font-size: 1.25rem; }
        .progress-bar { height: 4px; background: #ddd; margin-bottom: 1.5rem; border-radius: 2px; }
        .progress-inner { height: 100%; background: var(--qmax-orange); width: 0%; transition: 0.3s; }
        select { width: 100%; padding: 1rem; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 2rem; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 1.1rem; margin-bottom: 0.8rem; border: 2px solid #edf2f7; border-radius: 8px; background: #f8fafc; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .option-btn:hover { background-color: #ebf8ff; border-color: var(--qmax-orange); transform: translateX(5px); }
        .btn-primary { background: var(--qmax-orange); color: white; border: none; padding: 1rem 2.5rem; border-radius: 50px; cursor: pointer; font-weight: bold; display: block; margin: 1.5rem auto; font-size: 1.1rem; text-decoration:none; text-align:center;}
        
        /* 結果・回答一覧専用スタイル */
        .result-section-title { font-weight: bold; color: var(--qmax-blue); margin-top: 1.5rem; border-left: 4px solid var(--qmax-orange); padding-left: 0.8rem; font-size: 1.1rem; }
        .result-content { background: #f9fbff; padding: 1.2rem; border-radius: 8px; margin-top: 0.5rem; font-size: 0.95rem; white-space: pre-wrap; }
        .dialogue-box { margin-top: 1rem; padding: 1rem; border-radius: 8px; font-size: 0.9rem; }
        .ng-box { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; }
        .ok-box { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
        
        .admin-section { margin-top: 5rem; padding: 2rem; border-top: 1px dashed #ccc; text-align: center; }
        .admin-btn { background: #718096; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.85rem; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f4f4f4; color: #1e3a5f; }
        .badge-cell { font-weight: bold; text-align: center; width: 80px; }
    </style>
</head>
<body>

<header>
    <h1>人間道場：自己フィールド認定テスト</h1>
    <p style="font-size:0.9rem; opacity:0.8;">「実るほど頭を垂れる稲穂かな」</p>
</header>

<div class="container">
    <!-- 名前選択 -->
    <div id="step-name" class="card active">
        <h2>修練を始める前に：名前を選択</h2>
        <select id="employee-list">
            <option value="" disabled selected>リストから選択</option>
            <option>吉武 直志</option><option>髙瀬 悠二</option><option>石井 祥太</option><option>宝満 勇蔵</option><option>西村 ひとみ</option>
            <option>張 宝俊</option><option>西寺 舞</option><option>中山 好成</option><option>山本 祥平</option><option>牟田 理菜</option>
            <option>岩橋 沙穂里</option><option>三浦 健二</option><option>暁山 拓夢</option><option>大月 駿人</option><option>村上 俊輔</option>
            <option>森本 努</option><option>小柳 亜衣</option><option>江藤 拓也</option><option>原野 靖之</option><option>山口 伶奈</option>
            <option>中村 美穂</option><option>バムルンタイ ナタポン</option><option>冨田 翔太</option><option>須堯 淳</option><option>大野 万慧</option>
            <option>首藤 祐樹</option><option>チュウ シュウビン</option><option>陳 姜瑋</option><option>沈 知燮</option><option>蒲 明基</option>
            <option>古賀山 翔</option><option>廣門 悟士</option><option>片岡 春泉</option><option>前田 翼</option><option>亀井 結人</option>
            <option>石田 萌々華</option><option>米須 夕姫</option><option>河瀬 耀子</option><option>安東 なるみ</option><option>佐野 美鈴</option>
            <option>平尾 拓海</option><option>小林 太一</option><option>松井 未来</option><option>小畑 耀</option><option>日髙 菜々子</option>
            <option>黄 卓賢</option><option>坂本 雄介</option><option>堀江 梨乃</option><option>ユベール ミカエル</option><option>宮里 使永那</option>
            <option>浦山 巧</option><option>岡 玲良</option><option>沼田 忠信</option><option>池本 悠河</option><option>喜田 咲楽</option>
            <option>桂木 乃亜</option><option>夏目 雅矢</option><option>王 藝暁</option><option>福原 奏来</option>
        </select>
        <button class="btn-primary" onclick="startTest()">診断を開始する</button>
    </div>

    <!-- 質問コンテナ -->
    <div id="quiz-container"></div>

    <!-- 結果表示 -->
    <div id="result" class="card">
        <div id="res-user-header" style="text-align:center; font-weight:bold; color:var(--qmax-orange); margin-bottom:1rem;"></div>
        <div id="result-badge" style="text-align:center; font-size:2.5rem; margin-bottom:0.5rem;"></div>
        <div id="result-title" style="font-size:1.8rem; font-weight:bold; color:var(--qmax-blue); text-align:center; margin-bottom:2rem;"></div>
        <div class="result-section-title">▼特徴</div><div id="res-features" class="result-content"></div>
        <div class="result-section-title">▼先輩になったときの失敗例</div><div id="res-failures" class="result-content"></div>
        <div class="result-section-title">▼対策・意識すること</div><div id="res-measures" class="result-content"></div>
        <div class="result-section-title">▼具体例</div><div id="res-dialogue-ng" class="dialogue-box ng-box"></div><div id="res-dialogue-ok" class="dialogue-box ok-box"></div>
        <button class="btn-primary" style="margin-top:3rem;" onclick="location.reload()">もう一度診断する</button>
    </div>

    <!-- 回答ページ（判定ロジック一覧） -->
    <div id="logic-page" class="card" style="max-width: 1000px;">
        <h2 style="text-align:center;">回答一覧・判定ロジック</h2>
        <p style="font-size:0.9rem; text-align:center; margin-bottom:2rem;">各設問の選択肢と、それに対応するフィールド判定の根拠一覧です。</p>
        <div id="logic-list"></div>
        <button class="btn-primary" onclick="location.reload()">テストに戻る</button>
    </div>

    <!-- 管理者メニュー -->
    <div class="admin-section">
        <button class="admin-btn" onclick="openLogic()">回答一覧ページを開く</button>
        <button class="admin-btn" onclick="unlockAdmin()">新人データ・履歴を確認</button>
        
        <div id="admin-content" style="display:none; margin-top:2rem;">
            <h3>新人メンバー判定データ</h3>
            <table>
                <tr><th>名前</th><th>特性</th></tr>
                <tr><td>夏目 雅矢</td><td>🦔ハリネズミ</td></tr><tr><td>岡 玲良</td><td>🦔ハリネズミ/社欠</td></tr><tr><td>宮里 使永那</td><td>🐶チワワ</td></tr><tr><td>桂木 乃亜</td><td>🐰うさぎ</td></tr><tr><td>池本 悠河</td><td>🐈社欠ねこ</td></tr><tr><td>喜田 咲楽</td><td>🐶チワワ</td></tr><tr><td>福原 奏来</td><td>🐈ねこ</td></tr><tr><td>王 藝暁</td><td>🐈ねこ/社欠</td></tr>
            </table>
            <h3 style="margin-top:2rem;">実施履歴</h3>
            <div id="history-list" style="text-align:left; background:#fff; padding:1rem; border-radius:8px; border:1px solid #ddd; max-height:300px; overflow-y:auto;"></div>
        </div>
    </div>
</div>

<script>
    var scores = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };
    var selectedName = "";

    const questions = [
        { q: "Q1：後輩が同じミスをした時のあなたの脳内は？", 
          o: { B: "またか…最悪だ。私が謝りに行かなきゃ。", A: "怒ったら嫌われるかな。傷つけたくないな。", C: "普通、メモ取るでしょ。なんでできないの？", D: "説明する時間が無駄。自分でやるのが早い。", E: "ミスは本人の選択。事実を分析しよう。", F: "これは彼が考え方を磨く絶好のチャンスだ。" },
          l: { B: "不安・自己防衛。ミスを自分のリスクとして捉えている。", A: "迎合・承認欲求。指導より機嫌を優先している。", C: "攻撃・優越。自分の「普通」で相手を裁いている。", D: "孤立・効率。育成をコストと考え対話を拒絶している。", E: "自律・客観。感情を切り離し事実に集中している。", F: "成熟・育成。30手先を読み、ミスを教育の素材に変換している。" }
        },
        { q: "Q2：新しい評価制度が導入された。あなたの本音は？", 
          o: { A: "みんなが納得してるなら波風立てずに合わせる。", B: "ハードルが上がる…。自分はやっていけるかな。", C: "基準を満たさない人間は淘汰されて当然だ。", D: "業務に関係ない制度は非効率だ。", E: "この制度を使って人生をどう豊かにできるだろうか。", F: "制度の意図を汲み取り、後輩に納得できる形で翻訳しよう。" },
          l: { A: "迎合。周囲の反応に依存している。", B: "不安。変化を脅威として捉えている。", C: "攻撃。制度を他者を排除する武器にしている。", D: "合理的独善。調整要素を「無駄」と切り捨てている。", E: "自律。環境をどう自律に役立てるか考えている。", F: "成熟。組織の大善とチームの幸福を繋ごうとしている。" }
        },
        { q: "Q3：多忙な時に後輩から「教えてください」と相談されたら？", 
          o: { A: "断ると嫌われるから、無理してでも今教える。", B: "教えないと後で不満を抱かれる、困ったな。", C: "自分で調べれば？ それぐらいの主体性は持ってほしい。", D: "手順書を投げるから読んで。それ以外は後で。", E: "15分自分で調べて、1時間後に仮説を持ってきて。", F: "今の彼なら全部教えず、重要ポイントだけ教えよう。" },
          l: { A: "依存的な優しさ。見映えを優先する小善。", B: "将来のトラブルへの怯え。", C: "正論による突き放し。相手を見下している。", D: "感情の省略。情報の受け渡しのみ。", E: "仕組みによる自律促進（15分ルール）。", F: "成長のセンターピンを見極めた指導。" }
        },
        { q: "Q4：会議で、後輩から自分の意見に「反対」された時の反応は？", 
          o: { A: "嫌な思いさせたかな。私の言い方が悪かったか。", B: "否定されるなんてショック。もう発言したくない。", C: "私の経験が正しい。君はまだ何も分かっていない。", D: "感情論はどうでもいい。データだけで話をしよう。", E: "面白い視点だ。成果に繋げられるか検討しよう。", F: "反対が出るのは良い組織。もっと議論を深めよう。" },
          l: { A: "卑下。反対意見を「嫌われた」と変換している。", B: "逃避。不安になり殻に閉じこもっている。", C: "傲慢。過去の成功体験に固執し論破を狙っている。", D: "排除。相手の背景を汲み取らず論理で黙らせる。", E: "客観。反対意見をデータとして受け止めている。", F: "集合知性の活用。異なる意見を歓迎している。" }
        },
        { q: "Q5：締切直前、後輩の作業が大幅に遅れている。間に合わない時どうする？", 
          o: { A: "彼の気持ちを尊重し、一緒に残業して手伝う。", B: "どうしよう、間に合わなかったら私の責任だ…と焦る。", C: "「だから言っただろ！」と叱り、力ずくで終わらせる。", D: "「もういい」と突き放し、自分が巻き取って終わらせる。", E: "論理的に「間に合わない事実」を突きつけ、作業を分割する。", F: "最優先の『センターピン』を特定し、そこだけ彼に完遂させる。" },
          l: { A: "小善。依存を助長させている。", B: "自己防衛。全体の結果より自分の責任を恐れている。", C: "支配。ミスを裁く機会にしている。", D: "教育の放棄。効率のみを優先して切り捨てている。", E: "合理的解決。損害を最小限に抑える判断。", F: "大善。責任を全うさせつつ成功体験を積ませる。" }
        },
        { q: "Q6：後輩が会社の方針に不満を漏らしている時の対応は？", 
          o: { A: "「君の気持ちはよく分かるよ」と全力で同調する。", B: "不満を聞いて、自分も不安になってしまう。", C: "「決まりなんだから四の五の言うな」と一蹴する。", D: "「不満があるなら外で試せばいい」と突き放す。", E: "「不満は自由だが、この環境でどう動くか」を冷静に話す。", F: "不満の奥にある期待を汲み取り、長期的な『大善』を説く。" },
          l: { A: "大悪。不満フィールドに留め、成長を止めている。", B: "負の連鎖。0点付近の考え方に流されている。", C: "思考停止の強要。権力での封殺。", D: "排除。対話を無駄と考え切り捨てている。", E: "自律。環境ではなく自分の考え方を変える促し。", F: "人間道場の本質。不満を修行に再定義している。" }
        },
        { q: "Q7：後輩が「AとBどちらが正解ですか？」と答えを求めてきた。", 
          o: { A: "彼が迷わないよう、すぐに「Aだよ」と教えてあげる。", B: "自分も迷ってしまい「どっちだろうね」と一緒に悩む。", C: "「それぐらい自分で考えろ」と突き放す。", D: "「論理的にはAだ」と最短ルートの回答だけ渡す。", E: "「君の人生の選択だ。自分で決めて責任を取れ」と促す。", F: "あえて答えず「2ヶ月後の理想から見て、どちらがセンターピンかな？」と問う。" },
          l: { A: "依存の助長。思考停止を招いている。", B: "リーダーシップ欠如。判断基準の欠如。", C: "攻撃。ヒントすら与えない突き放し。", D: "効率優先。思考のプロセスを軽視している。", E: "冷徹な自律。責任を強調するが突き放している。", F: "思考の型の伝達。逆算思考を訓練させている。" }
        },
        { q: "Q8：後輩が同じミスを繰り返した。イラ立ちを覚えた時の行動は？", 
          o: { A: "自分の感情を押し殺し、より優しく接しようとする。", B: "あからさまに落胆し、無言の圧力をかけてしまう。", C: "怒りに任せて「何度言えば分かるんだ！」と詰める。", D: "感情を完全にシャットアウトし、事務的な修正だけ行う。", E: "イラ立ちをメタ認知し、ミスの根本原因をデータで分析する。", F: "怒りを自覚した上で、あえて厳しく「君の市場価値」について説く。" },
          l: { A: "問題の先送り。本質から逃げている。", B: "感情的な逃避。周囲を萎縮させている。", C: "感情の爆発。支配によるストレス発散。", D: "対人拒否。相手を「機能」として扱っている。", E: "自己完結。客観視はできているが対話がない。", F: "感情の制御。相手の将来を守る大善の選択。" }
        },
        { q: "Q9：自分が後輩の前で重大な判断ミスをしてしまったら？", 
          o: { A: "全力で謝罪し、汚名返上のために後輩の仕事まで引き受ける。", B: "権威が傷つくのを恐れ、なんとか理由をつけて正当化する。", C: "「環境が悪かった」「指示が曖昧だった」と他責にする。", D: "ミスを無かったことにし、速やかに次のタスクへ移動する。", E: "淡々とミスを報告し、修正プランを論理的に提示する。", F: "非を認め「今の私はハリネズミ的だった」とメタ認知を共有する。" },
          l: { A: "機嫌取り。本来の役割を崩している。", B: "自己防衛。失敗を認める恐怖からの逃避。", C: "他責。プライドを守るために周囲を攻撃。", D: "隠蔽。信頼関係の毀損を無視している。", E: "事務的処理。感情的ケアの不足。", F: "最高の手本。未完成さを認め学び続ける姿勢。" }
        },
        { q: "Q10：情報共有を「無駄」だと言う後輩をどう指導する？", 
          o: { A: "「みんな困るから」と、情に訴えてお願いする。", B: "「共有してくれないと私も困る」と泣きつく。", C: "「共有しないなら評価を下げる」と脅す。", D: "「共有しないなら君一人で完結させろ」と孤立させる。", E: "「共有は情報の同期コストだ」と効率の面から説明する。", F: "「共有はチームを止めないための高度な技術だ」と定義を書き換える。" },
          l: { A: "交渉の放棄。情に依存した妥協。", B: "被害者の立場。依存的な解決。", C: "権力行使。短期的な支配。", D: "バラバラの許容。組織の崩壊。", E: "論理的説得。考え方の修正には至っていない。", F: "価値観のアップデート。視座を一段階上げる教育。" }
        }
    ];

    function startTest() {
        var s = document.getElementById('employee-list');
        if(!s.value){ alert("名前を選択してください"); return; }
        selectedName = s.value;
        document.getElementById('step-name').classList.remove('active');
        renderQuiz();
    }

    function renderQuiz() {
        let container = document.getElementById('quiz-container');
        container.innerHTML = "";
        questions.forEach((item, index) => {
            let div = document.createElement('div');
            div.id = "q" + index;
            div.className = "card" + (index === 0 ? " active" : "");
            let ops = "";
            let keys = Object.keys(item.o).sort(() => Math.random() - 0.5);
            keys.forEach(k => { ops += `<button class="option-btn" onclick="next(${index}, '${k}')">${item.o[k]}</button>`; });
            div.innerHTML = `<div class="progress-bar"><div class="progress-inner" style="width:${(index+1)*10}%"></div></div><h2>${item.q}</h2><div class="options">${ops}</div>`;
            container.appendChild(div);
        });
    }

    function next(idx, type) {
        scores[type]++;
        document.getElementById('q' + idx).classList.remove('active');
        if (idx + 1 < questions.length) { document.getElementById('q' + (idx + 1)).classList.add('active'); }
        else { showResult(); }
    }

    const fieldData = {
        B: { badge: "🐰", title: "うさぎフィールド", features: "悲観的・不安・自己防衛", failures: "場の空気を下げる・判断回避", measures: "事実と感情を分ける・安心材料を渡す", ng: "❌NG: 「この先どうなるか不安だよね…」", ok: "⭕OK: 「不安だけど整理して進めましょう」" },
        A: { badge: "🐶", title: "チワワフィールド", features: "迎合・承認欲求・他者依存", failures: "指導の曖昧化・役割の崩壊", measures: "役割としての判断を優先・NGを明確に", ng: "❌NG: 「君の好きなやり方でいいよ」", ok: "⭕OK: 「この基準で進めてほしい。理由は〜」" },
        C: { badge: "🦔", title: "ハリネズミフィールド", features: "攻撃・正論・優越感", failures: "見下し・優劣の確認", measures: "過程を見る・言語化共有・強さより成長支援", ng: "❌NG: 「前にも言ったよね？なんでできないの？」", ok: "⭕OK: 「全体は良いのでこの1点を直そう」" },
        D: { badge: "🐈", title: "社会性に欠けるねこ", features: "孤立・合理的独善・配慮欠如", failures: "情報断絶・メリット優先", measures: "配慮は仕事の技術・周囲を動かす自覚", ng: "❌NG: 「聞いてこないから放置しました」", ok: "⭕OK: 「チームのために念のため共有します」" },
        E: { badge: "🐈", title: "ねこフィールド", features: "自律・論理的・個人主義", failures: "戸惑いを拾わない・説明省略", measures: "相手がどう感じるかを考慮・対話の余地", ng: "❌NG: 「自分は整理できてるからこの方針でいくね」", ok: "⭕OK: 「自分はこう整理したが違和感はある？」" },
        F: { badge: "🦁", title: "ライオンフィールド", features: "成熟・謙虚・育成・協働", failures: "自己完結・慢心（稀）", measures: "30手先を読む大善・謙虚な見本", ng: "❌NG: 「自分でやるからもういいよ」", ok: "⭕OK: 「ここは任せたい。一緒に確認しよう」" }
    };

    function showResult() {
        var maxType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        var data = fieldData[maxType];
        document.getElementById('res-user-header').innerText = selectedName + " さんの診断結果";
        document.getElementById('result-badge').innerText = data.badge;
        document.getElementById('result-title').innerText = data.title;
        document.getElementById('res-features').innerText = data.features;
        document.getElementById('res-failures').innerText = data.failures;
        document.getElementById('res-measures').innerText = data.measures;
        document.getElementById('res-dialogue-ng').innerText = data.ng;
        document.getElementById('res-dialogue-ok').innerText = data.ok;
        document.getElementById('result').classList.add('active');
        saveHistory(selectedName, data.title);
        window.scrollTo(0, 0);
    }

    function saveHistory(n, t) {
        var h = JSON.parse(localStorage.getItem('qmax_v4_history') || "[]");
        h.push({ n: n, t: t, d: new Date().toLocaleString() });
        localStorage.setItem('qmax_v4_history', JSON.stringify(h));
    }

    function unlockAdmin() {
        if (prompt("暗証番号") === "20050315manurewa") {
            document.getElementById('admin-content').style.display = 'block';
            var h = JSON.parse(localStorage.getItem('qmax_v4_history') || "[]");
            document.getElementById('history-list').innerHTML = h.reverse().map(i => `<div style="padding:5px; border-bottom:1px solid #eee;">[${i.d}] ${i.n} : ${i.t}</div>`).join('') || "履歴なし";
        }
    }

    function openLogic() {
        if (prompt("管理者暗証番号") === "20050315manurewa") {
            // 全カードを非表示
            document.getElementById('step-name').classList.remove('active');
            document.getElementById('quiz-container').innerHTML = "";
            document.getElementById('result').classList.remove('active');
            
            // 回答一覧を生成
            let html = "";
            const fieldNames = { A: "🐶チワワ", B: "🐰うさぎ", C: "🦔ハリネズミ", D: "🐈社欠ねこ", E: "🐈ねこ", F: "🦁ライオン" };
            
            questions.forEach((q, i) => {
                html += `<div style="margin-bottom:2rem; border:1px solid #ddd; border-radius:8px; overflow:hidden;">
                    <div style="background:#1e3a5f; color:white; padding:10px; font-weight:bold;">${q.q}</div>
                    <table>
                        <tr><th style="width:120px;">タイプ</th><th>選択肢の文章</th><th>判定ロジック（根拠）</th></tr>`;
                Object.keys(q.o).forEach(key => {
                    html += `<tr>
                        <td class="badge-cell">${fieldNames[key]}</td>
                        <td>${q.o[key]}</td>
                        <td style="color:#666;">${q.l[key]}</td>
                    </tr>`;
                });
                html += `</table></div>`;
            });
            document.getElementById('logic-list').innerHTML = html;
            document.getElementById('logic-page').classList.add('active');
            window.scrollTo(0, 0);
        }
    }
</script>
